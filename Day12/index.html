<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <h2>To-Do App</h2><br>

    <input type="text" id="todo-input" placeholder="Enter task">
    <input type="date" id="todo-date">
    <input type="time" id="todo-time">

    <p id="error" style="color:red; display:none; margin:5px 0;">
        Field cannot be empty
    </p>

    <button class="add-btn" id="add-btn">Add</button>
    <button class="add-btn" id="sort-btn">Sort</button>

    <ul id="todo-list"></ul>
</div>

<div class="priority">
    <label>
        <input type="radio" name="priority" value="Urgent" checked> 
        <span class="urgent-label">Urgent</span>
    </label>

    <label>
        <input type="radio" name="priority" value="Normal"> 
        <span class="normal-label">Normal</span>
    </label>
</div>

<script src="script.js"></script>
</body>
</html>
